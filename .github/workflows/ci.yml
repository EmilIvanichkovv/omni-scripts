name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Rust checks and tests
  rust:
    name: Rust (${{ matrix.check }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    strategy:
      fail-fast: false
      matrix:
        check: [fmt, clippy, test]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ matrix.check }}-${{ hashFiles('rust/**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.check }}-
            ${{ runner.os }}-cargo-

      - name: Check formatting
        if: matrix.check == 'fmt'
        run: cargo fmt --all -- --check

      - name: Run Clippy
        if: matrix.check == 'clippy'
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        if: matrix.check == 'test'
        run: cargo test --all-features --workspace

  # Nix build check
  nix:
    name: Nix Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Check flake
        run: nix flake check

      - name: Build default package
        run: nix build

      - name: Build all packages
        run: |
          nix build .#local-git-branch-cleanup
          nix build .#local-git-branch-cleanup-tui

  # Bash script tests
  bash-tests:
    name: Bash Tests (bats)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Run bats tests
        run: |
          if compgen -G "bash/**/*.bats" > /dev/null; then
            bats bash/**/*.bats
          else
            echo "No bats tests found, skipping"
          fi
